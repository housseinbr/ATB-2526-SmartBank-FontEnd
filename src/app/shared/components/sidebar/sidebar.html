<aside class="sidebar" [class.sidebar--collapsed]="isCollapsed()">
  <button 
    class="sidebar__toggle" 
    (click)="toggleSidebar()" 
    title="Réduire / Étendre"
  >
    <span class="sidebar__toggle-arrow" [class.sidebar__toggle-arrow--collapsed]="isCollapsed()">
      ◀
    </span>
  </button>

  <div class="sidebar__brand">
    <div class="sidebar__brand-logo">ATB</div>
    <div class="sidebar__brand-text">
      <span class="sidebar__brand-title">ATB</span>
      <span class="sidebar__brand-sub">{{ config[role()].brandLabel }}</span>
    </div>
  </div>

  <nav class="sidebar__nav">
    @for (item of config[role()].items; track item.route) {
      <a class="sidebar__link" [routerLink]="item.route">
        <app-icon class="sidebar__link-icon" [name]="$any(item.icon)" [size]="18" />
        <span class="sidebar__link-label">{{ item.label }}</span>
        @if (badgeFor(item); as count) {
          <span class="sidebar__badge">{{ count }}</span>
        }
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__user">
      <div class="sidebar__user-avatar">{{ initials }}</div>
      <div class="sidebar__user-info">
        <span class="sidebar__user-name">{{ fullName }}</span>
        <span class="sidebar__user-email">{{ email }}</span>
      </div>
    </div>
    <button class="sidebar__logout" (click)="logout()" title="Déconnexion">
      <app-icon name="log-out" [size]="18" />
    </button>
  </div>
</aside>
