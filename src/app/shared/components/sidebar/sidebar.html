<aside class="sidebar" [class.sidebar--collapsed]="collapsed">
  <div class="sidebar__brand">
    <div class="sidebar__brand-left">
      <div class="sidebar__logo">ATB</div>
      @if (!collapsed) {
        <div class="sidebar__brand-text">
          <span class="sidebar__brand-name">ATB</span>
          <span class="sidebar__brand-sub">{{ config.brandLabel }}</span>
        </div>
      }
    </div>
    <button
      type="button"
      class="sidebar__collapse-btn"
      (click)="toggleCollapse()"
      [attr.aria-label]="collapsed ? 'Déplier le menu' : 'Réduire le menu'"
    >
      <app-icon name="chevron-left" [size]="16" />
    </button>
  </div>

  <nav class="sidebar__nav">
    <ul>
      @for (item of config.items; track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="sidebar__link--active"
            class="sidebar__link"
            [title]="collapsed ? item.label : ''"
          >
            <app-icon [name]="item.icon" [size]="18" />
            @if (!collapsed) {
              <span class="sidebar__label">{{ item.label }}</span>
            }
            @if (badgeFor(item); as count) {
              <span class="sidebar__badge" [class.sidebar__badge--collapsed]="collapsed">{{ count }}</span>
            }
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__avatar">{{ initials }}</div>
    @if (!collapsed) {
      <div class="sidebar__user">
        <span class="sidebar__user-name">{{ fullName }}</span>
        <span class="sidebar__user-email">{{ currentUser?.email }}</span>
      </div>
    }
    <button type="button" class="sidebar__logout" (click)="logout()" aria-label="Déconnexion">
      <app-icon name="log-out" [size]="16" />
    </button>
  </div>
</aside>
