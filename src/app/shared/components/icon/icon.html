<svg
  [attr.width]="size"
  [attr.height]="size"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="1.8"
  stroke-linecap="round"
  stroke-linejoin="round"
  class="app-icon"
>
  @switch (name) {
    @case ('grid') {
      <rect x="3" y="3" width="7" height="7" rx="1.5" />
      <rect x="14" y="3" width="7" height="7" rx="1.5" />
      <rect x="3" y="14" width="7" height="7" rx="1.5" />
      <rect x="14" y="14" width="7" height="7" rx="1.5" />
    }
    @case ('user') {
      <circle cx="12" cy="8" r="3.5" />
      <path d="M4.5 20.5c1.4-3.6 4-5.5 7.5-5.5s6.1 1.9 7.5 5.5" />
    }
    @case ('user-plus') {
      <circle cx="9.5" cy="8" r="3.2" />
      <path d="M3 20c1.2-3.4 3.4-5.2 6.5-5.2S15 16.6 16.2 20" />
      <path d="M19 8v5M16.5 10.5h5" />
    }
    @case ('calendar') {
      <rect x="3.5" y="4.5" width="17" height="16" rx="2" />
      <path d="M3.5 9.5h17M8 2.5v4M16 2.5v4" />
    }
    @case ('bar-chart') {
      <path d="M5 20V11M12 20V4M19 20v-7" />
    }
    @case ('award') {
      <circle cx="12" cy="8.5" r="5" />
      <path d="M9 13l-1.5 7L12 18l4.5 2L15 13" />
    }
    @case ('book-open') {
      <path d="M12 6.5c-1.8-1.4-4-2-6.5-2v13c2.5 0 4.7.6 6.5 2 1.8-1.4 4-2 6.5-2v-13c-2.5 0-4.7.6-6.5 2z" />
      <path d="M12 6.5v13" />
    }
    @case ('briefcase') {
      <rect x="3" y="7.5" width="18" height="12" rx="2" />
      <path d="M8 7.5v-2a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M3 12.5h18" />
    }
    @case ('star') {
      <path d="M12 3.5l2.6 5.4 5.9.8-4.3 4.2 1 5.9-5.2-2.8-5.2 2.8 1-5.9-4.3-4.2 5.9-.8z" />
    }
    @case ('bell') {
      <path d="M6 10a6 6 0 0 1 12 0c0 4 1.3 5.4 1.3 5.4H4.7S6 14 6 10z" />
      <path d="M9.5 18.5a2.5 2.5 0 0 0 5 0" />
    }
    @case ('users') {
      <circle cx="9" cy="8" r="3.2" />
      <path d="M2.7 20c1.1-3.3 3.2-5 6.3-5s5.2 1.7 6.3 5" />
      <path d="M16 4.8a3.2 3.2 0 0 1 0 6.3M19 20c-.5-2.4-1.5-4-3.2-4.7" />
    }
    @case ('inbox') {
      <path d="M3.5 12.5h5l1.7 3h3.6l1.7-3h5" />
      <path d="M5 5.5h14l1.5 7v6a2 2 0 0 1-2 2H5.5a2 2 0 0 1-2-2v-6z" />
    }
    @case ('shield') {
      <path d="M12 3.5l7 2.8v5.4c0 4.6-3 7.9-7 9-4-1.1-7-4.4-7-9V6.3z" />
      <path d="M9 12l2 2 4-4.2" />
    }
    @case ('log-out') {
      <path d="M9 4.5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h3" />
      <path d="M14.5 8l4 4-4 4M18 12H9" />
    }
    @case ('chevron-left') {
      <path d="M14.5 5l-6.5 7 6.5 7" />
    }
    @case ('search') {
      <circle cx="10.5" cy="10.5" r="6.5" />
      <path d="M20 20l-4.5-4.5" />
    }
  }
</svg>
